name: Build and Publish RecoveryMore
on: [push]

permissions:
  contents: write  # This allows the action to create the public release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build

      - name: Build Project
        run: cmake --build build --config Release

      - name: Create Release and Upload EXE
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: false
          title: "RecoveryMore Latest Build"
          files: |
            build/Release/RecoveryMore.exe
