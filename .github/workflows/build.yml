name: RecoveryMore Smart Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check_and_build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install WebView2 SDK
        run: vcpkg install webview2:x64-windows

      - name: Configure CMake
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build Project
        run: cmake --build build --config Release

      - name: Package Release
        shell: pwsh
        run: |
          mkdir dist
          copy build/Release/RecoveryMore.exe dist/
          # This is the "Motor" for Chromium
          copy C:/vcpkg/installed/x64-windows/bin/WebView2Loader.dll dist/
          Compress-Archive -Path dist/* -DestinationPath RecoveryMore_Final.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "RecoveryMore Latest Build"
          files: RecoveryMore_Final.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
