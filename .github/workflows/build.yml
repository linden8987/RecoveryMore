name: RecoveryMore Full Bundle
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check_and_build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install WebView2 SDK
        run: vcpkg install webview2:x64-windows

      - name: Configure and Build
        run: |
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build build --config Release

      - name: Bundle Dependencies
        shell: pwsh
        run: |
          mkdir dist
          # Copy the App
          copy build/Release/RecoveryMore.exe dist/
          # Copy Chromium Loader
          copy C:/vcpkg/installed/x64-windows/bin/WebView2Loader.dll dist/
          # Copy the "Windows 2000 Error" Fixers (VCRuntime and MSVCP)
          copy C:/Windows/System32/vcruntime140.dll dist/
          copy C:/Windows/System32/msvcp140.dll dist/
          # Create the final ZIP
          Compress-Archive -Path dist/* -DestinationPath RecoveryMore_Suite_With_DLLs.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "RecoveryMore Lead Architect Suite"
          files: RecoveryMore_Suite_With_DLLs.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
