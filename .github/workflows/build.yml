name: Build RecoveryMore EXE
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        run: cmake -B build
      - name: Build Project
        run: cmake --build build --config Release
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: RecoveryMore-Release
          path: build/Release/RecoveryMore.exe
