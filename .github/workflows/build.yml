name: RecoveryMore Smart Build
on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 minutes
  push:
    branches: [ main ]
  workflow_dispatch:      # Allows you to click "Run workflow" manually

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check_and_build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Look back at least 2 commits to compare

      - name: Check for new changes
        id: check_changes
        shell: bash
        run: |
          # If triggered by a schedule, check if the last commit was in the last 5 mins
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            LAST_COMMIT_TIME=$(git log -1 --format=%ct)
            CURRENT_TIME=$(date +%s)
            DIFF=$(( (CURRENT_TIME - LAST_COMMIT_TIME) / 60 ))
            
            if [ $DIFF -gt 5 ]; then
              echo "No new changes in the last 5 minutes. Skipping build."
              echo "should_build=false" >> $GITHUB_OUTPUT
            else
              echo "New changes detected. Proceeding..."
              echo "should_build=true" >> $GITHUB_OUTPUT
            fi
          else
            # Always build on manual trigger or push
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure and Build
        if: steps.check_changes.outputs.should_build == 'true'
        run: |
          cmake -B build
          cmake --build build --config Release

      - name: Create or Update Release
        if: steps.check_changes.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "RecoveryMore Latest Build"
          files: build/Release/RecoveryMore.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
