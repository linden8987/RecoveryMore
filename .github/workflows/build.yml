name: RecoveryMore Smart Build
on:
  schedule:
    - cron: '*/5 * * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check_and_build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for new changes
        id: check_changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            LAST_COMMIT_TIME=$(git log -1 --format=%ct)
            CURRENT_TIME=$(date +%s)
            DIFF=$(( (CURRENT_TIME - LAST_COMMIT_TIME) / 60 ))
            if [ $DIFF -gt 5 ]; then
              echo "should_build=false" >> $GITHUB_OUTPUT
            else
              echo "should_build=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Install WebView2 SDK
        if: steps.check_changes.outputs.should_build == 'true'
        run: vcpkg install webview2:x64-windows

      - name: Configure CMake
        if: steps.check_changes.outputs.should_build == 'true'
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build Project
        if: steps.check_changes.outputs.should_build == 'true'
        run: cmake --build build --config Release

      - name: Create or Update Release
        if: steps.check_changes.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "RecoveryMore Latest Build"
          files: build/Release/RecoveryMore.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
