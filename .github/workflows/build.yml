name: RecoveryMore
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check_and_build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install WebView2 SDK
        run: vcpkg install webview2:x64-windows

      - name: Configure and Build
        run: |
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build build --config Release

      - name: Bundle Dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "build/Release/RecoveryMore.exe" -Destination "dist/"
          Copy-Item "C:/vcpkg/installed/x64-windows/bin/WebView2Loader.dll" -Destination "dist/"
          
          # Bundle the Runtimes
          Copy-Item "C:/Windows/System32/vcruntime140.dll" -Destination "dist/"
          Copy-Item "C:/Windows/System32/vcruntime140_1.dll" -Destination "dist/"
          Copy-Item "C:/Windows/System32/msvcp140.dll" -Destination "dist/"
          
          # Download a reliable Fixed Version of the Chromium engine
          $url = "https://msedge.sf.dl.delivery.mp.microsoft.com/filestreamingservice/files/339466c1-229f-4328-912b-7f15e8072a39/Microsoft.WebView2.FixedVersionRuntime.110.0.1587.63.x64.cab"
          Invoke-WebRequest -Uri $url -OutFile "runtime.cab"
          
          # Extract the CAB content into the dist folder
          expand runtime.cab -F:* dist/
          
          Compress-Archive -Path dist/* -DestinationPath RecoveryMore.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "RecoveryMore"
          files: RecoveryMore.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
